<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おすすめ - 初めての映画鑑賞</title>
    <link rel="stylesheet" href="recommend.css" />
  </head>
  <body>
    <div class="page-title">
      <h1>おすすめ</h1>
    </div>

    <div class="content-container">
      <h2 class="spot-title">新宿バルト９</h2>

      <div class="recommend-item">
        <div class="image-box">
          <img src="バルト.jpg" alt="新宿バルト9 ロビー" />
        </div>
        <p class="description">
          新宿駅から徒歩５分のアクセス最良の映画館
          <br />
          映画のキャラクターパネルやここにしかない限定グッズも多数販売している
        </p>
      </div>

      <div class="recommend-item">
        <div class="image-box">
          <img src="カフェ.jpg" alt="Cafe OASE" />
        </div>
        <p class="description">
          新宿バルト9の10Fにある Cafe OASEでは、人気コンテンツのコラボメニューを販売している
          その他さまざまな通常メニューもある
        </p>
      </div>

      <div class="recommend-item">
        <div class="image-box">
          <img src="バターオイル.png" alt="バターフレーバーオイル" />
        </div>
        <p class="description">
          全国のTOHOシネマズでは、購入したポップコーンに「バターフレーバーオイル」を無料でかけ放題できるサービスがある
        </p>
      </div>

      <div class="recommend-item">
        <div class="image-box">
          <img src="スクリーンショット 2026-06-04 18.00.34.png" alt="ICEE" />
        </div>
        <p class="description">
          1967年にアメリカで誕生し、世界中で年間5億杯以上飲まれている大人気の「炭酸フローズン」
          <br />
          シュワシュワとした炭酸の刺激とフルーティーな味わいが特徴
        </p>
      </div>

      <div class="bottom-nav">
        <a href="index.html" class="nav-btn">ホーム</a>
        <a href="manner.html" class="nav-btn">マナー</a>
        <a href="preparetion.html" class="nav-btn">準備</a>
      </div>
    </div>
  </body>
</html>
